workflows:
  build_android:
    name: Build Vidyakunj Android APK
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - chmod +x android/gradlew
      - chmod +rwx android/gradle/wrapper/gradle-wrapper.jar
      - flutter pub get
      - flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
