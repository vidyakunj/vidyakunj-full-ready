// android/app/build.gradle - Flutter 3.38 compatible (Android v2 embedding)
def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
def properties = new Properties()
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { instr ->
        properties.load(instr)
    }
}

def flutterRoot = properties.getProperty("flutter.sdk")
assert flutterRoot != null, "flutter.sdk not set in local.properties"

apply plugin: "com.android.application"
apply plugin: "kotlin-android"
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    compileSdkVersion 34
    namespace "com.vidyakunj.app"
    ndkVersion flutter.ndkVersion

    defaultConfig {
        // keep your applicationId
        applicationId "com.vidyakunj.app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
        // If you use MultiDex or other flags, add here
    }

    signingConfigs {
        debug {
            // default debug signing (Codemagic will handle signing in release if configured)
        }
    }

    buildTypes {
        release {
            // don't hardcode release signing here unless you configured keys
            signingConfig signingConfigs.debug
            minifyEnabled false
            // proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.23"
}
